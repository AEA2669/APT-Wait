<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DFW TSA Wait Times</title>
<style>
    body { font-family: Arial; background:#f4f6f9; padding:20px; }
    h1 { color:#00338D; }
    .updated { margin-bottom:20px; color:#555; }
    .terminal { background:white; padding:15px; margin-bottom:20px;
                border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    .terminal h2 { color:#D9222A; }
    table { width:100%; border-collapse:collapse; }
    th { background:#00338D; color:white; padding:8px; }
    td { padding:8px; border-bottom:1px solid #ddd; }
    .open { color:green; font-weight:bold; }
    .closed { color:#D9222A; font-weight:bold; }
</style>
</head>
<body>

<h1>DFW TSA Wait Times</h1>
<div class="updated" id="updated">Loading...</div>
<div id="content"></div>

<script>
async function loadWaitTimes() {
    try {
        const dfwUrl = "https://www.dfwairport.com/api/waittimes";

        // Cubic CORS relay
        const relay = "https://cubic-cors.vercel.app/api?url=" + encodeURIComponent(dfwUrl);

        const res = await fetch(relay);
        const data = await res.json();

        const grouped = {};
        data.forEach(item => {
            if (!grouped[item.terminal]) grouped[item.terminal] = [];
            grouped[item.terminal].push(item);
        });

        let html = "";
        Object.keys(grouped).forEach(terminal => {
            html += `<div class="terminal">
                        <h2>Terminal ${terminal}</h2>
                        <table>
                            <tr>
                                <th>Checkpoint</th>
                                <th>Type</th>
                                <th>Status</th>
                                <th>Wait</th>
                            </tr>`;

            grouped[terminal].forEach(cp => {
                html += `<tr>
                            <td>${cp.checkpoint}</td>
                            <td>${cp.type}</td>
                            <td class="${cp.status === 'Open' ? 'open' : 'closed'}">${cp.status}</td>
                            <td>${cp.waitTime} min</td>
                         </tr>`;
            });

            html += `</table></div>`;
        });

        document.getElementById("content").innerHTML = html;
        document.getElementById("updated").innerText =
            "Last Updated: " + new Date().toLocaleString();

    } catch (e) {
        document.getElementById("updated").innerText = "Error loading data.";
        console.error(e);
    }
}

loadWaitTimes();
setInterval(loadWaitTimes, 30000);
</script>

</body>
</html>
